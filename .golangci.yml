version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*github.com/hashicorp/terraform-plugin-sdk/v2/helper/schema.ResourceData).Set
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
    paths:
      - vendor

formatters:
  enable:
    - gofmt

run:
  timeout: 5m
