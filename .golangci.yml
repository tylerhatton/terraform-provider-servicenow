linters:
  disable-all: true
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - misspell

linters-settings:
  errcheck:
    # Allow ignoring errors from these specific calls that are intentional
    exclude-functions:
      - (*github.com/hashicorp/terraform-plugin-sdk/v2/helper/schema.ResourceData).Set

issues:
  exclude-rules:
    # Acceptance tests have a lot of long config strings — relax lints there
    - path: _test\.go
      linters:
        - errcheck
  exclude-dirs:
    - vendor

run:
  timeout: 5m
